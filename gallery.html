  <style>
    .gallery { max-width: 1100px; margin: 60px auto; padding: 0 20px; }
    .gallery h1 { text-align: center; color: #fff; margin-bottom: 40px; font-size: 2.5rem; text-shadow: 0 2px 4px rgba(0,0,0,0.3); }
    .gallery-slideshow { position: relative; width: 100%; min-height: 420px; margin-bottom: 30px; overflow: hidden; border-radius: 18px; background: #000; box-shadow: 0 18px 50px rgba(0,0,0,0.3); }
    .slide { display: none; width: 100%; height: 100%; }
    .slide.active { display: block; }
    .slide img { width: 100%; height: 420px; object-fit: cover; display: block; }
    .slide-btn { position: absolute; top: 50%; transform: translateY(-50%); width: 48px; height: 48px; border-radius: 50%; border: none; background: rgba(0,0,0,0.45); color: #fff; font-size: 1.5rem; cursor: pointer; display: flex; align-items: center; justify-content: center; z-index: 2; transition: background 0.2s ease; }
    .slide-btn:hover { background: rgba(0,0,0,0.7); }
    .slide-prev { left: 18px; }
    .slide-next { right: 18px; }
    .slide-counter { position: absolute; right: 18px; bottom: 18px; padding: 10px 16px; background: rgba(0,0,0,0.55); color: #fff; border-radius: 999px; font-size: 0.95rem; z-index: 2; }
    .gallery-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 18px; width: 100%; }
    .gallery-item { position: relative; overflow: hidden; border-radius: 14px; box-shadow: 0 8px 24px rgba(0,0,0,0.2); transition: transform 0.3s ease, box-shadow 0.3s ease; }
    .gallery-item:hover { transform: translateY(-6px); box-shadow: 0 14px 32px rgba(0,0,0,0.35); }
    .gallery-item img { width: 100%; height: 250px; object-fit: cover; border-radius: 14px; cursor: pointer; display: block; }
    .lightbox { position: fixed; inset: 0; display: none; background: rgba(0,0,0,0.92); align-items: center; justify-content: center; z-index: 1000; backdrop-filter: blur(4px); }
    .lightbox img { max-width: 90%; max-height: 90%; border-radius: 12px; box-shadow: 0 20px 60px rgba(0,0,0,0.5); }
    .lightbox.show { display: flex; }
    @media(max-width: 1024px) { .gallery-grid { grid-template-columns: repeat(2, 1fr); gap: 16px; } }
    @media(max-width: 768px) { .gallery-grid { grid-template-columns: 1fr; gap: 14px; } .gallery h1 { font-size: 1.8rem; } .slide img { height: 280px; } }
  </style>

  <script>
    const slides = document.querySelectorAll('.gallery-slideshow .slide');
    const prevButton = document.querySelector('.slide-prev');
    const nextButton = document.querySelector('.slide-next');
    const counter = document.querySelector('.slide-counter');
    let currentSlide = 0;

    function showSlide(index) {
      if (!slides.length) return;
      currentSlide = (index + slides.length) % slides.length;
      slides.forEach((slide, idx) => slide.classList.toggle('active', idx === currentSlide));
      if (counter) counter.textContent = `${currentSlide + 1} / ${slides.length}`;
    }

    function changeSlide(direction) {
      showSlide(currentSlide + direction);
    }

    if (prevButton) prevButton.addEventListener('click', () => {
      changeSlide(-1);
      resetSlideInterval();
    });
    if (nextButton) nextButton.addEventListener('click', () => {
      changeSlide(1);
      resetSlideInterval();
    });

    let slideInterval = setInterval(() => changeSlide(1), 4000);
    function resetSlideInterval() {
      clearInterval(slideInterval);
      slideInterval = setInterval(() => changeSlide(1), 4000);
    }

    document.querySelectorAll('.gallery-item img').forEach((img, index) => {
      img.addEventListener('click', () => {
        showSlide(index);
        resetSlideInterval();
        const slideshowTop = document.querySelector('.gallery-slideshow').offsetTop - 20;
        window.scrollTo({ top: slideshowTop, behavior: 'smooth' });
      });
    });

    const slideshow = document.querySelector('.gallery-slideshow');
    if (slideshow) {
      slideshow.addEventListener('mouseenter', () => clearInterval(slideInterval));
      slideshow.addEventListener('mouseleave', () => {
        slideInterval = setInterval(() => changeSlide(1), 4000);
      });
    }

    showSlide(0);
  </script>
